<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Farm – Miro Richhardt</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="gamethemes.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-outer);
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
    color: var(--color-text);
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.25s, color 0.25s;
  }

  .back {
    align-self: flex-start;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--color-dim);
    text-decoration: none;
    text-transform: uppercase;
    margin-bottom: 1rem;
    transition: color 0.15s;
  }
  .back:hover { color: var(--color-accent); }

  h1 {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-accent);
    margin-bottom: 1.25rem;
    transition: color 0.25s;
  }

  .game {
    width: 100%;
    max-width: 780px;
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: auto 1fr auto;
    gap: 1px;
    background: var(--bg-border);
    border: 1px solid var(--bg-border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(226,75,74,0.06);
    transition: background 0.25s, border-color 0.25s;
  }

  .stats {
    grid-column: 1 / -1;
    background: var(--bg-game);
    border-bottom: 1px solid var(--bg-border);
    padding: 0.75rem 1.25rem;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    align-items: center;
    transition: background 0.25s, border-color 0.25s;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-muted); transition: color 0.25s; }
  .stat-value { font-size: 16px; font-weight: 700; color: var(--color-text); transition: color 0.25s; }
  .stat-value.green { color: var(--color-green); }
  .stat-value.red   { color: var(--color-accent); }
  .stat-value.blue  { color: var(--color-blue); }

  .main {
    background: var(--bg-game);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    transition: background 0.25s;
  }

  .ops-display { display: flex; flex-direction: column; gap: 6px; }
  .ops-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-muted); transition: color 0.25s; }
  .ops-bar { height: 6px; background: var(--bg-border); border-radius: 3px; overflow: hidden; transition: background 0.25s; }
  .ops-bar-fill { height: 100%; background: var(--color-blue); border-radius: 3px; transition: width 0.05s linear, background 0.25s; width: 0%; }
  .ops-numbers { font-size: 13px; color: var(--color-blue); transition: color 0.25s; }

  .actions { display: flex; gap: 8px; }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    border: 1px solid var(--bg-border-light);
    border-radius: 4px;
    cursor: pointer;
    background: var(--bg-panel);
    color: var(--color-text);
    transition: background 0.15s, border-color 0.15s, transform 0.1s, color 0.25s;
    flex: 1;
  }
  .btn:hover { background: var(--bg-border-light); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { border-color: var(--color-accent); color: var(--color-accent); }
  .btn.primary:hover { background: var(--bg-panel); }
  .btn.sell { border-color: var(--color-green); color: var(--color-green); }
  .btn.sell:hover { background: var(--bg-panel); }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--color-accent);
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--bg-border);
    transition: color 0.25s, border-color 0.25s;
  }

  .farm-grid { display: flex; flex-direction: column; gap: 4px; }
  .farm-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--color-dim); transition: color 0.25s; }
  .farm-row.active { color: var(--color-text); }
  .farm-row-icon { width: 16px; text-align: center; }
  .farm-row-name { flex: 1; }
  .farm-row-count { color: var(--color-gold); }
  .farm-row-ops { color: var(--color-blue); font-size: 10px; }

  .log-wrap {
    grid-column: 1 / -1;
    background: var(--bg-outer);
    border-top: 1px solid var(--bg-border);
    padding: 0.6rem 1.25rem;
    transition: background 0.25s, border-color 0.25s;
  }
  #log { font-size: 11px; color: var(--color-muted); line-height: 1.7; white-space: pre-wrap; transition: color 0.25s; }

  .shop {
    background: var(--bg-panel);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    overflow-y: auto;
    max-height: 500px;
    transition: background 0.25s;
  }
  .shop-section { display: flex; flex-direction: column; gap: 4px; }

  .shop-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: 4px;
    border: 0.5px solid var(--bg-border);
    background: var(--bg-game);
    gap: 6px;
    font-size: 11px;
    color: var(--color-dim);
    user-select: none;
    transition: border-color 0.15s, background 0.25s, color 0.25s;
  }
  .shop-item.can-afford { color: var(--color-text); border-color: var(--bg-border-light); }
  .shop-item.bought { color: var(--color-green); border-color: var(--bg-border); opacity: 0.7; }

  .shop-item-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; flex-wrap: wrap; }
  .shop-item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .shop-icon { color: var(--color-gold); flex-shrink: 0; transition: color 0.25s; }
  .shop-name { font-size: 11px; white-space: nowrap; }
  .shop-count { color: var(--color-gold); font-size: 10px; }
  .shop-contrib { color: var(--color-blue); font-size: 10px; transition: color 0.25s; }
  .shop-cost { font-size: 10px; color: var(--color-green); white-space: nowrap; transition: color 0.25s; }

  .shop-btn {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 0.5px solid var(--color-green);
    background: transparent;
    color: var(--color-green);
    cursor: pointer;
    white-space: nowrap;
    outline: none;
    transition: background 0.15s, color 0.25s, border-color 0.25s;
  }
  .shop-btn:hover { background: var(--bg-border); }
  .shop-btn.disabled { border-color: var(--bg-border-light); color: var(--color-dim); cursor: default; pointer-events: none; }
</style>
</head>
<body>

<div class="theme-switcher" role="group" aria-label="Theme">
  <button class="theme-btn" data-theme="light" title="Light"><i class="ti ti-sun" aria-hidden="true"></i></button>
  <button class="theme-btn" data-theme="reader" title="Reader"><i class="ti ti-book" aria-hidden="true"></i></button>
  <button class="theme-btn" data-theme="dark" title="Dark"><i class="ti ti-moon" aria-hidden="true"></i></button>
  <button class="theme-btn" data-theme="black" title="Black"><i class="ti ti-device-desktop" aria-hidden="true"></i></button>
  <span class="switcher-sep"></span>
  <button class="lang-btn" data-lang="de" onclick="applyLang('de')">DE</button>
  <button class="lang-btn" data-lang="en" onclick="applyLang('en')">EN</button>
</div>

<a class="back game-fade" href="../miro_richhardt_resume.html" data-i18n="sf.back">← zurück zum lebenslauf</a>
<h1 class="game-fade">⬛ Server Farm</h1>

<div class="game game-fade">
  <div class="stats">
    <div class="stat"><span class="stat-label">Credits</span><span class="stat-value green" id="credits">0</span></div>
    <div class="stat"><span class="stat-label">Ops/s</span><span class="stat-value blue" id="ops-s">0/s</span></div>
    <div class="stat"><span class="stat-label">Click Power</span><span class="stat-value" id="click-power">1</span></div>
    <div class="stat"><span class="stat-label">Total Earned</span><span class="stat-value red" id="total-earned">0</span></div>
    <button onclick="resetProgress()" data-i18n-title="sf.reset.title" title="Fortschritt zurücksetzen" style="margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;border:0.5px solid var(--bg-border-light);border-radius:4px;background:transparent;color:var(--color-dim);cursor:pointer;opacity:0.5;transition:opacity 0.15s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5">↺ reset</button>
  </div>

  <div class="main">
    <div class="ops-display">
      <span class="ops-label">Ops Buffer</span>
      <div class="ops-bar"><div class="ops-bar-fill" id="ops-bar-fill"></div></div>
      <span class="ops-numbers" id="ops">0 / 100</span>
    </div>
    <div class="actions">
      <button class="btn primary" onclick="processClick()">[ PROCESS ]</button>
      <button class="btn sell" onclick="sellOps(); this.blur()">[ SELL OPS ]</button>
    </div>
    <div>
      <div class="section-label" data-i18n="sf.farm.label">Your Farm</div>
      <div class="farm-grid" id="farm-grid">
        <div class="farm-row"><span class="farm-row-icon">·</span><span class="farm-row-name" style="color:var(--color-dim)" data-i18n="sf.farm.empty">Empty — buy your first server</span></div>
      </div>
    </div>
  </div>

  <div class="shop">
    <div class="shop-section">
      <div class="section-label" data-i18n="sf.section.hardware">Hardware</div>
      <div id="server-list"></div>
    </div>
    <div class="shop-section">
      <div class="section-label" data-i18n="sf.section.upgrades">Upgrades</div>
      <div id="upgrade-list"></div>
    </div>
  </div>

  <div class="log-wrap">
    <div id="log"></div>
  </div>
</div>

<script src="../i18n.js?v=2"></script>
<script src="gamethemes.js"></script>
<script src="serverfarm.js"></script>
</body>
</html>
